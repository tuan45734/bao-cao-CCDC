<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Báo Cáo Kệ - Hệ Thống Quản Lý NPP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- Login Modal -->
    <div id="loginModal" class="login-modal">
        <div class="login-modal-content">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1>Báo Cáo Kệ NPP</h1>
                <p>Đăng nhập hệ thống quản lý</p>
            </div>
            <div class="login-body">
                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-key"></i>
                        <span>Mã truy cập</span>
                    </div>
                    <input type="password" id="accessCode" class="input-field" placeholder="Nhập mã đăng nhập..." autocomplete="off">
                </div>
                <button class="login-btn" id="loginBtn">
                    <i class="fas fa-arrow-right-to-bracket"></i> Đăng nhập
                </button>
                <div id="loginError" class="login-error" style="display: none;">
                    <i class="fas fa-exclamation-triangle"></i> <span id="errorText">Mã không hợp lệ</span>
                </div>
                
            </div>
        </div>
    </div>

    <!-- Main Dashboard (ẩn ban đầu) -->
    <div class="app" id="dashboardApp" style="display: none;">
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="logo-header">
                        <div class="logo-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="logo-text">
                            <h1>Báo Cáo CCDC</h1>
                            <p>Hệ thống quản lý báo cáo kệ theo khu vực</p>
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <div class="role-badge" id="roleBadge">
                        <i class="fas fa-user-shield"></i>
                        <span id="roleName"></span>
                    </div>
                    <div class="date-badge">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Đăng xuất</span>
                    </button>
                </div>
            </header>

            <!-- Filter Section -->
            <div class="filter-card">
                <div class="filter-label">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Chọn khu vực</span>
                </div>
                <div class="filter-controls">
                    <select id="kvSelect" class="filter-select">
                        <option value="all">📌 Tất cả khu vực</option>
                        <option value="KV1">📍 Khu vực 1</option>
                        <option value="KV2">📍 Khu vực 2</option>
                        <option value="KV3">📍 Khu vực 3</option>
                        <option value="KV4">📍 Khu vực 4</option>
                        <option value="KV5">📍 Khu vực 5</option>
                        <option value="KV6">📍 Khu vực 6</option>
                    </select>
                    <div class="filter-icon">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid" id="statsCards"></div>

            <!-- Charts Row -->
            <div class="charts-row">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>
                            <i class="fas fa-chart-simple"></i>
                            <span id="chartTitle">Tổng quan kệ theo khu vực</span>
                        </h3>
                        <div class="chart-actions">
                            <button class="chart-action-btn" onclick="window.downloadChart('overviewChart')" title="Tải ảnh">
                                <i class="fas fa-download"></i>
                            </button>
                            <button class="chart-action-btn" onclick="window.expandChart('overviewChart')" title="Phóng to">
                                <i class="fas fa-expand"></i>
                            </button>
                        </div>
                    </div>
                    <div class="chart-body">
                        <canvas id="overviewChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h3>
                            <i class="fas fa-layer-group"></i>
                            <span id="levelChartTitle">Thống kê kệ theo mức</span>
                        </h3>
                        <div class="chart-actions">
                            <button class="chart-action-btn" onclick="window.downloadChart('levelChart')" title="Tải ảnh">
                                <i class="fas fa-download"></i>
                            </button>
                            <button class="chart-action-btn" onclick="window.expandChart('levelChart')" title="Phóng to">
                                <i class="fas fa-expand"></i>
                            </button>
                        </div>
                    </div>
                    <div class="chart-body">
                        <canvas id="levelChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-card">
                <div class="table-header-custom">
                    <div class="table-title">
                        <i class="fas fa-table-list"></i>
                        <h3 id="tableTitle">Dữ liệu chi tiết</h3>
                    </div>
                    <div class="table-actions">
                        <div class="search-wrapper">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="searchInput" placeholder="Tìm kiếm NPP...">
                            <button id="clearSearch" class="clear-btn">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <button class="export-btn" onclick="window.exportToExcel()">
                            <i class="fas fa-file-excel"></i>
                            <span>Xuất Excel</span>
                        </button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th><i class="fas fa-map-pin"></i> Khu vực</th>
                                <th><i class="fas fa-store"></i> NPP</th>
                                <th><i class="fas fa-boxes"></i> Kệ đã xuất</th>
                                <th><i class="fas fa-clipboard-list"></i> Kệ đã đăng ký</th>
                                <th><i class="fas fa-cloud-upload-alt"></i> Kệ đã upload</th>
                                <th><i class="fas fa-clock"></i> Kệ chưa upload</th>
                                <th><i class="fas fa-exclamation-triangle"></i> Kệ thiếu</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for chart expansion -->
    <div id="chartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Biểu đồ</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <canvas id="modalChart"></canvas>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
